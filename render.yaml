services:
  - type: web
    name: webnesti
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: DATABASE_URL
        value: ./data/webnesti.db
    disk:
      name: webnesti-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
